user:
  name: "Your Full Name"
  email: "you@example.com"
  location: "City, Country"
  linkedin_url: "https://linkedin.com/in/yourhandle"
  linkedin_display: "linkedin.com/in/yourhandle"
  portfolio_url: "https://yoursite.com"
  portfolio_display: "yoursite.com"

cv:
  source: cv.md                  # path to your CV markdown file

llm:
  endpoint: http://127.0.0.1:11434/v1
  model: qwen3:8b
  thinking: true                 # enable Qwen3 thinking mode (recommended)
  tool_calls: false              # default: Node orchestrates; set true to let Qwen drive tools
  timeout_ms: 90000
  max_retries: 1
  temperature: 0.3

pdf:
  paper: a4                      # a4 or letter
  page_margin: "0.6in"

comp:
  enabled: true                  # Block D scraping; --no-comp flag overrides
  sources:
    - glassdoor
    - levelsfyi

tracker:
  file: data/applications.md

search:
  keywords:
    - "Software Engineer"
    - "Backend Engineer"
    - "SDE"
  locations:
    - "Bangalore, India"
    - "Remote"
  experience_years: 3
  min_eval_score: 3.0
  min_apply_score: 3.8
  date_posted_days: 7
  blocked_companies:
    - "Wipro"
    - "Infosys"
  blocked_keywords:
    - "intern"
    - "contract"
    - "freelance"
  excluded_title_keywords:
    - "new grad"
    - "new graduate"
    - "graduate engineer"
    - "university grad"
    - "campus"
    - "entry level"
    - "junior"

sources:
  ats_apis:
    enabled: true
    companies:
      - { name: "Stripe", ats: "greenhouse", slug: "stripe" }
      - { name: "Notion", ats: "ashby", slug: "notion" }
      - { name: "Razorpay", ats: "lever", slug: "razorpay" }
  jobspy:
    enabled: false
    boards: [linkedin, indeed, naukri, glassdoor]
    results_per_board: 50
    proxies: []
  playwright_scrapers:
    enabled: false
    boards: [wellfound, instahyre]

apply:
  enabled: false
  daily_cap: 30
  delay_between_ms: 12000
  platforms:
    linkedin: true
    greenhouse: true
    lever: true
    ashby: true
    naukri: true
  linkedin_session_file: data/linkedin-session.json
  answers:
    years_experience: 4
    notice_period_days: 30
    expected_salary_inr: 2500000
    willing_to_relocate: true
    visa_sponsorship_needed: false
    work_authorization: "Indian citizen, authorized to work in India"
    cover_letter: auto
